<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Simple Test - Career Assessment</title>
  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container py-4">
    <header class="mb-4 text-center">
      <h1 class="display-4">Simple Test</h1>
      <p class="lead">Discover your ideal career path based on your personality, skills, and interests.</p>
    </header>

    <!-- Progress Bar -->
    <div class="progress mb-4">
      <div id="progress-bar" class="progress-bar" role="progressbar" style="width: 0%;" aria-valuenow="0"
        aria-valuemin="0" aria-valuemax="100">0%</div>
    </div>

    <!-- Questions Container -->
    <div id="test-container"></div>

    <!-- Pagination Controls -->
    <nav id="pagination" class="my-4 d-flex justify-content-between align-items-center">
      <button id="prev-btn" class="btn btn-secondary" disabled>Previous</button>
      <span id="page-info"></span>
      <button id="next-btn" class="btn btn-secondary">Next</button>
    </nav>

    <!-- Submit Button (visible on last page) -->
    <div id="submit-container" class="text-center my-4" style="display:none;">
      <button id="submit-btn" class="btn btn-primary btn-lg">Submit Test</button>
    </div>

    <!-- Result Container -->
    <div id="result" class="mt-5"></div>
  </div>

  <!-- Bootstrap and jQuery -->
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Custom JS -->
  <script src="app.js"></script>
</body>
</html>
